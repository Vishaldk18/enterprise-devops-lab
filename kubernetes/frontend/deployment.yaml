apiVersion: apps/v1
kind: Deployment
 
metadata:
  name: frontend
  namespace: demo-namespace
  labels:
    app: frontend
 
spec:
  replicas: 2
 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
 
  selector:
    matchLabels:
      app: frontend
 
  template:
    metadata:
      labels:
        app: frontend
 
    spec:
      containers:
      - name: frontend
        image: 372858676531.dkr.ecr.eu-north-1.amazonaws.com/enterprise-frontend:latest
        imagePullPolicy: Always
 
        ports:
        - containerPort: 80
 
        envFrom:
        - configMapRef:
            name: frontend-config
 
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
 
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
 
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 20
