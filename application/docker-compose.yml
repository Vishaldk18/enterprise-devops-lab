services:
  redis:
    image: redis:7-alpine
    container_name: redis
  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      ENVIRONMENT: DEV
      VERSION: 1.0.0
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
        - redis
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on: 
     - backend
